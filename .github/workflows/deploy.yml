name: Deploy Japan 2026 Website

on:
  push:
      branches: [main]
        workflow_dispatch:

        permissions:
          contents: read
            pages: write
              id-token: write

              jobs:
                deploy:
                    runs-on: ubuntu-latest
                        environment:
                              name: github-pages
                                    url: ${{ steps.deployment.outputs.page_url }}
                                        steps:
                                              - name: Checkout
                                                      uses: actions/checkout@v4

                                                            - name: Extract zip
                                                                    run: |
                                                                              unzip japan-2026-website*.zip -d site/
                                                                                        ls site/

                                                                                              - name: Setup Pages
                                                                                                      uses: actions/configure-pages@v4
                                                                                                      
                                                                                                            - name: Upload artifact
                                                                                                                    uses: actions/upload-pages-artifact@v3
                                                                                                                            with:
                                                                                                                                      path: site/
                                                                                                                                      
                                                                                                                                            - name: Deploy to GitHub Pages
                                                                                                                                                    id: deployment
                                                                                                                                                            uses: actions/deploy-pages@v4
